services:
  postgres:
    image: postgres:16
    container_name: bootcamp-postgres
    restart: always
    environment:
      POSTGRES_DB: ml_bootcamp_db
      POSTGRES_USER: bootcamp
      POSTGRES_PASSWORD: bootcamp123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: bootcamp-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bootcamp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: